name: Daily dashboard refresh

on:
  schedule:
    # ~7:15 AM Denver (13:15 UTC during daylight time). GitHub may delay
    # scheduled runs by 5-20 minutes.
    - cron: "15 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh market data (quotes, fundamentals, FRED macro, CFTC COT)
        run: python refresh_data.py
      - name: Run quant workup on the Top 3 picks
        run: python quant.py
      - name: Build dashboard.html
        run: python build_dashboard.py
      - name: Stage site
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Commit refreshed data back to the repo
        run: |
          git config user.name "dashboard-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add market_data.json quant_data.json dashboard.html
          git commit -m "Daily data refresh" || echo "nothing to commit"
          git push

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
